<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Sounds</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Rounded square background -->
        <rect width="40" height="40" rx="10" fill="#1a1008"/>
        <rect width="40" height="40" rx="10" fill="url(#grad)" opacity="0.15"/>
        <!-- Equalizer bars - 5 bars with varying heights, bottom-aligned -->
        <rect x="5"  y="22" width="4" height="12" rx="2" fill="#cc785c" opacity="0.5"/>
        <rect x="11" y="14" width="4" height="20" rx="2" fill="#cc785c" opacity="0.75"/>
        <rect x="17" y="8"  width="4" height="26" rx="2" fill="#e8956d"/>
        <rect x="23" y="14" width="4" height="20" rx="2" fill="#cc785c" opacity="0.75"/>
        <rect x="29" y="18" width="4" height="16" rx="2" fill="#cc785c" opacity="0.5"/>
        <!-- Subtle top highlight -->
        <rect width="40" height="1" rx="0.5" fill="white" opacity="0.06"/>
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40">
            <stop offset="0%" stop-color="#e8956d"/>
            <stop offset="100%" stop-color="#cc785c"/>
          </linearGradient>
        </defs>
      </svg>
      Claude Sounds
    </div>
    <div class="header-status">
      <span id="header-badge" class="badge off"><span class="dot"></span>加载中</span>
      <label class="switch" title="启用/禁用插件">
        <input type="checkbox" id="plugin-enabled">
        <span class="slider"></span>
      </label>
    </div>
  </header>

  <!-- Nav -->
  <nav>
    <div class="tab active" data-tab="status">状态</div>
    <div class="tab" data-tab="themes">主题</div>
    <div class="tab" data-tab="store">商店</div>
    <div class="tab" data-tab="project">项目配置</div>
  </nav>

  <!-- Content -->
  <div class="content">

    <!-- Status tab -->
    <div id="tab-status" class="tab-pane">
      <div class="card">
        <div class="card-title">当前主题</div>
        <div class="toggle">
          <span>全局主题</span>
          <span id="current-theme" style="color:var(--accent);font-weight:600">—</span>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Hooks</div>
        <div id="hooks-list"></div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:4px">
        <button class="btn btn-sm btn-danger" onclick="stopServer()">停止 Web UI 服务</button>
      </div>
    </div>

    <!-- Themes tab -->
    <div id="tab-themes" class="tab-pane" style="display:none">
      <div class="section-title">已安装主题</div>
      <div id="themes-grid" class="theme-grid">
        <div class="loading"><span class="spin"></span>加载中...</div>
      </div>

      <div class="section-title">安装本地主题</div>
      <input type="file" id="upload-input" accept=".cstheme" style="display:none">
      <div class="upload-zone" id="upload-zone">
        <div class="upload-icon">📦</div>
        <div>拖拽或点击安装 .cstheme 文件</div>
        <div style="font-size:12px;margin-top:4px;color:var(--text2)">支持本地打包的主题包</div>
      </div>
    </div>

    <!-- Store tab -->
    <div id="tab-store" class="tab-pane" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="color:var(--text2);font-size:13px">从 GitHub 主题商店浏览和安装主题</div>
        <button class="btn btn-sm" onclick="refreshStore()">↻ 刷新</button>
      </div>
      <div class="card">
        <div id="store-list">
          <div class="loading"><span class="spin"></span>正在获取主题商店...</div>
        </div>
      </div>
    </div>

    <!-- Project tab -->
    <div id="tab-project" class="tab-pane" style="display:none">
      <input type="hidden" id="project-path">
      <div style="display:flex;gap:16px;align-items:flex-start">

        <!-- Left: project list -->
        <div style="width:220px;flex-shrink:0">
          <div class="card" style="padding:12px">
            <div class="card-title" style="margin-bottom:10px">项目列表</div>
            <div id="project-list">
              <div class="loading"><span class="spin"></span></div>
            </div>
            <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
              <div style="display:flex;gap:6px">
                <input id="manual-path" type="text" placeholder="粘贴项目路径" onkeydown="if(event.key==='Enter')addManualProject()"
                  style="flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);
                         border-radius:6px;padding:6px 8px;color:var(--text);font-size:12px;outline:none">
                <button class="btn btn-sm" onclick="addManualProject()">+</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: config detail -->
        <div style="flex:1;min-width:0">
          <div id="project-detail">
            <div class="empty" style="margin-top:40px">
              <div class="empty-icon">👈</div>
              从左侧选择一个项目
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<div id="toast"></div>
<script src="app.js"></script>
</body>
</html>
