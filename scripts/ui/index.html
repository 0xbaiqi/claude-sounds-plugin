<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Sounds</title>
  <link rel="stylesheet" href="style.css">
  <script src="i18n.js"></script>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="#1a1008"/>
        <rect width="40" height="40" rx="10" fill="url(#grad)" opacity="0.15"/>
        <rect x="5"  y="22" width="4" height="12" rx="2" fill="#cc785c" opacity="0.5"/>
        <rect x="11" y="14" width="4" height="20" rx="2" fill="#cc785c" opacity="0.75"/>
        <rect x="17" y="8"  width="4" height="26" rx="2" fill="#e8956d"/>
        <rect x="23" y="14" width="4" height="20" rx="2" fill="#cc785c" opacity="0.75"/>
        <rect x="29" y="18" width="4" height="16" rx="2" fill="#cc785c" opacity="0.5"/>
        <rect width="40" height="1" rx="0.5" fill="white" opacity="0.06"/>
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40">
            <stop offset="0%" stop-color="#e8956d"/>
            <stop offset="100%" stop-color="#cc785c"/>
          </linearGradient>
        </defs>
      </svg>
      Claude Sounds
      <span id="plugin-version" style="font-size:11px;font-weight:400;color:var(--text2);margin-left:6px"></span>
    </div>
    <div class="header-status">
      <span id="header-badge" class="badge off"><span class="dot"></span><span id="badge-text"></span></span>
      <label class="switch" id="plugin-toggle-label">
        <input type="checkbox" id="plugin-enabled">
        <span class="slider"></span>
      </label>
      <button class="btn btn-sm" id="lang-btn" onclick="toggleLang()"
              style="font-size:12px;padding:4px 10px;min-width:42px"></button>
    </div>
  </header>

  <!-- Nav -->
  <nav>
    <div class="tab active" data-tab="status" id="tab-btn-status"></div>
    <div class="tab" data-tab="themes" id="tab-btn-themes"></div>
    <div class="tab" data-tab="store" id="tab-btn-store"></div>
    <div class="tab" data-tab="project" id="tab-btn-project"></div>
  </nav>

  <!-- Content -->
  <div class="content">

    <!-- Status tab -->
    <div id="tab-status" class="tab-pane">
      <div class="card">
        <div class="card-title" id="lbl-current-theme"></div>
        <div class="toggle">
          <span id="lbl-global-theme"></span>
          <span id="current-theme" style="color:var(--accent);font-weight:600">—</span>
        </div>
      </div>
      <div class="card">
        <div class="card-title" id="lbl-hooks"></div>
        <div id="hooks-list"></div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:4px">
        <button class="btn btn-sm btn-danger" id="btn-stop-ui" onclick="stopServer()"></button>
      </div>
    </div>

    <!-- Themes tab -->
    <div id="tab-themes" class="tab-pane" style="display:none">
      <div class="section-title" id="lbl-installed-themes"></div>
      <div id="themes-grid" class="theme-grid">
        <div class="loading"><span class="spin"></span><span id="lbl-themes-loading"></span></div>
      </div>
      <div class="section-title" id="lbl-install-local"></div>
      <input type="file" id="upload-input" accept=".cstheme" style="display:none">
      <div class="upload-zone" id="upload-zone">
        <div class="upload-icon">📦</div>
        <div id="lbl-upload-hint"></div>
        <div id="lbl-upload-sub" style="font-size:12px;margin-top:4px;color:var(--text2)"></div>
      </div>
    </div>

    <!-- Store tab -->
    <div id="tab-store" class="tab-pane" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div id="lbl-store-desc" style="color:var(--text2);font-size:13px"></div>
        <button class="btn btn-sm" id="btn-refresh" onclick="refreshStore()"></button>
      </div>
      <div class="card">
        <div id="store-list">
          <div class="loading"><span class="spin"></span><span id="lbl-store-loading"></span></div>
        </div>
      </div>
    </div>

    <!-- Project tab -->
    <div id="tab-project" class="tab-pane" style="display:none">
      <input type="hidden" id="project-path">
      <div style="display:flex;gap:16px;align-items:flex-start">
        <div style="width:220px;flex-shrink:0">
          <div class="card" style="padding:12px">
            <div class="card-title" id="lbl-project-list" style="margin-bottom:10px"></div>
            <div id="project-list">
              <div class="loading"><span class="spin"></span></div>
            </div>
            <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
              <div style="display:flex;gap:6px">
                <input id="manual-path" type="text" onkeydown="if(event.key==='Enter')addManualProject()"
                  style="flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);
                         border-radius:6px;padding:6px 8px;color:var(--text);font-size:12px;outline:none">
                <button class="btn btn-sm" onclick="addManualProject()">+</button>
              </div>
            </div>
          </div>
        </div>
        <div style="flex:1;min-width:0">
          <div id="project-detail">
            <div class="empty" style="margin-top:40px">
              <div class="empty-icon">👈</div>
              <span id="lbl-select-project"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>
<script src="app.js"></script>
</body>
</html>
